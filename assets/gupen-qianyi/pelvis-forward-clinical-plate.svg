<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 860" role="img" aria-labelledby="title desc">
  <title id="title">骨盆前移临床解剖图版</title>
  <desc id="desc">米白临床手稿风格图版，用侧面垂线说明骨盆前移，并展示压力方向与改善顺序。</desc>
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="4" seed="27"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.09"/>
      </feComponentTransfer>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#4b3828" flood-opacity=".12"/>
    </filter>
    <marker id="arrowRust" viewBox="0 0 10 10" refX="8.2" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10Z" fill="#9d5a43"/>
    </marker>
    <marker id="arrowOlive" viewBox="0 0 10 10" refX="8.2" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10Z" fill="#788064"/>
    </marker>
    <style>
      .paper{fill:#f6eddb}
      .panel{fill:#fff8ea;fill-opacity:.62;stroke:#c8b694;stroke-width:2}
      .ink{stroke:#3b3027}
      .bone{stroke:#6a5847}
      .soft{stroke:#cbb99a}
      .rust{stroke:#9d5a43}
      .olive{stroke:#788064}
      .fill-bone{fill:#fff8ea}
      .fill-soft{fill:#eadcc4}
      .line{fill:none;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke-width:2}
      .med{stroke-width:4}
      .heavy{stroke-width:7}
      .label{font-family:"Songti SC","STSong","Noto Serif CJK SC","SimSun",serif;fill:#382c22}
      .muted{fill:#766656}
      .rustText{fill:#9d5a43}
      .oliveText{fill:#788064}
      .num{font-family:Georgia,"Times New Roman",serif;font-style:italic;fill:#a3845d}
    </style>
  </defs>

  <rect class="paper" width="1200" height="860"/>
  <rect width="1200" height="860" filter="url(#paperNoise)"/>
  <rect x="34" y="34" width="1132" height="792" rx="18" fill="none" stroke="#bba786" stroke-width="2"/>
  <rect x="54" y="54" width="1092" height="752" rx="12" fill="none" stroke="#d1c0a3" stroke-width="1.5"/>

  <g opacity=".46">
    <path class="line thin soft" d="M96 125 C67 103 67 66 99 48 C130 78 132 105 96 125Z"/>
    <path class="line thin soft" d="M119 175 C85 154 85 112 118 91 C150 122 151 154 119 175Z"/>
    <path class="line thin soft" d="M90 238 C56 216 59 176 94 154 C126 188 124 218 90 238Z"/>
    <path class="line thin soft" d="M112 52 C146 113 140 181 84 270"/>
    <path class="line thin soft" d="M1090 646 C1124 667 1121 707 1086 728 C1055 694 1057 666 1090 646Z"/>
    <path class="line thin soft" d="M1113 590 C1147 612 1143 652 1108 674 C1077 639 1079 610 1113 590Z"/>
    <path class="line thin soft" d="M1086 728 C1052 667 1058 599 1114 555"/>
  </g>

  <text x="600" y="100" text-anchor="middle" class="label" font-size="21" letter-spacing="8">CLINICAL TRAINING NOTE</text>
  <path class="line thin soft" d="M426 124 H774"/>
  <path class="line thin soft" d="M550 139 C570 126 630 126 650 139"/>
  <text x="600" y="197" text-anchor="middle" class="label" font-size="66" font-weight="700">骨盆前移改善思路</text>
  <text x="600" y="246" text-anchor="middle" class="label muted" font-size="27">先看承重线，再处理压力方向</text>

  <g transform="translate(72 288)" filter="url(#shadow)">
    <rect class="panel" x="0" y="0" width="610" height="456" rx="24"/>
    <path class="line thin soft" d="M28 48 C28 24 48 24 48 24 H562 C562 24 582 24 582 48"/>
    <path class="line thin soft" d="M28 408 C28 432 48 432 48 432 H562 C562 432 582 432 582 408"/>
    <text x="55" y="79" class="num" font-size="64">01</text>
    <text x="150" y="65" class="label" font-size="30" font-weight="700">侧面判断：骨盆是否离开承重线</text>
    <text x="152" y="103" class="label muted" font-size="18">看大转子，而不是先猜哪块肌肉弱</text>

    <line x1="214" y1="125" x2="214" y2="396" stroke="#788064" stroke-width="4" stroke-dasharray="10 10"/>
    <text x="72" y="162" class="label oliveText" font-size="21" font-weight="700">踝垂线</text>
    <text x="72" y="190" class="label muted" font-size="16">踝 · 膝 · 髋 · 肩</text>

    <g transform="translate(245 75) scale(.75)">
      <circle cx="186" cy="82" r="31" class="fill-bone line med ink"/>
      <path class="line thin soft" d="M174 77 C185 69 201 72 210 84"/>
      <path class="line heavy ink" d="M189 114 C161 167 162 224 196 282"/>
      <path class="line med soft" d="M176 140 C214 160 239 193 245 231"/>
      <path class="line med soft" d="M166 159 C201 181 222 212 226 250"/>
      <path class="line med bone" d="M142 277 C174 233 235 234 272 279 C248 319 194 331 151 305 C138 297 133 286 142 277Z"/>
      <path class="line thin soft" d="M160 298 C189 313 226 312 253 294"/>
      <circle cx="174" cy="283" r="13" class="line thin bone"/>
      <circle cx="238" cy="284" r="13" class="line thin bone"/>
      <path class="line heavy ink" d="M165 312 C154 356 160 392 186 433"/>
      <path class="line heavy ink" d="M231 313 C255 351 272 389 292 431"/>
      <path class="line heavy ink" d="M186 433 C168 451 143 458 119 455"/>
      <path class="line heavy ink" d="M292 431 C274 449 249 457 225 454"/>
      <path class="line med rust" d="M165 368 C199 356 238 357 272 370"/>
      <path class="line med olive" d="M102 456 C147 437 213 436 264 455"/>
    </g>

    <path d="M214 286 H405" stroke="#9d5a43" stroke-width="5" marker-end="url(#arrowRust)"/>
    <text x="416" y="278" class="label rustText" font-size="22" font-weight="700">大转子前移</text>
    <text x="416" y="306" class="label muted" font-size="16">骨盆整体跑到线前</text>
    <path class="line med rust" d="M454 198 C491 213 520 237 540 270" marker-end="url(#arrowRust)"/>
    <text x="454" y="168" class="label rustText" font-size="21" font-weight="700">腰椎硬顶</text>
    <text x="454" y="194" class="label muted" font-size="16">上身后仰平衡</text>
    <text x="423" y="382" class="label rustText" font-size="21" font-weight="700">膝超伸</text>
    <text x="423" y="408" class="label muted" font-size="16">用关节末端换稳定</text>
  </g>

  <g transform="translate(718 288)" filter="url(#shadow)">
    <rect class="panel" x="0" y="0" width="410" height="212" rx="24"/>
    <text x="42" y="68" class="num" font-size="56">02</text>
    <text x="120" y="56" class="label" font-size="28" font-weight="700">压力方向</text>
    <text x="121" y="90" class="label muted" font-size="17">胸廓与骨盆错位，腹压容易向前下方走</text>

    <g transform="translate(58 108)">
      <path class="line med ink" d="M66 18 C35 34 22 70 34 104 C49 144 96 151 127 125 C154 103 154 58 126 35 C111 23 90 16 66 18Z"/>
      <path class="line thin soft" d="M44 54 C70 41 103 44 128 62"/>
      <path class="line thin soft" d="M42 83 C72 70 106 73 130 93"/>
      <path class="line med rust" d="M39 116 C72 97 105 98 134 116"/>
      <path class="line thin ink" d="M86 22 V126"/>
      <path class="line med rust" d="M150 66 C182 75 207 94 226 121" marker-end="url(#arrowRust)"/>
    </g>

    <g transform="translate(292 120)">
      <path class="line med bone" d="M24 56 C40 24 82 21 110 54 C98 86 62 99 32 82 C23 77 19 67 24 56Z"/>
      <circle cx="49" cy="60" r="9" class="line thin bone"/>
      <circle cx="86" cy="61" r="9" class="line thin bone"/>
      <path class="line med rust" d="M38 39 C62 22 94 23 119 43" marker-end="url(#arrowRust)"/>
    </g>
  </g>

  <g transform="translate(718 532)" filter="url(#shadow)">
    <rect class="panel" x="0" y="0" width="410" height="212" rx="24"/>
    <text x="42" y="68" class="num" font-size="56">03</text>
    <text x="120" y="56" class="label" font-size="28" font-weight="700">改善顺序</text>
    <text x="121" y="90" class="label muted" font-size="17">不是先练臀腹，而是先把承重线找回来</text>

    <g transform="translate(32 116)">
      <circle cx="42" cy="30" r="26" fill="#fff8ea" stroke="#c8b694" stroke-width="2"/>
      <path class="line med ink" d="M22 39 C42 23 64 25 78 40"/>
      <path class="line med olive" d="M15 48 C39 60 67 58 89 46" marker-end="url(#arrowOlive)"/>
      <text x="42" y="84" text-anchor="middle" class="label" font-size="15">足跟</text>

      <path class="line med soft" d="M98 30 H138" marker-end="url(#arrowOlive)"/>
      <circle cx="168" cy="30" r="26" fill="#fff8ea" stroke="#c8b694" stroke-width="2"/>
      <path class="line med bone" d="M148 34 C161 10 195 12 207 34 C192 56 165 59 148 45Z"/>
      <path class="line med rust" d="M137 34 H174" marker-end="url(#arrowRust)"/>
      <text x="168" y="84" text-anchor="middle" class="label" font-size="15">骨盆</text>

      <path class="line med soft" d="M224 30 H264" marker-end="url(#arrowOlive)"/>
      <circle cx="294" cy="30" r="26" fill="#fff8ea" stroke="#c8b694" stroke-width="2"/>
      <path class="line med ink" d="M283 8 C270 30 274 50 296 62"/>
      <path class="line med olive" d="M268 62 C292 48 315 48 337 62"/>
      <text x="294" y="84" text-anchor="middle" class="label" font-size="15">向上</text>
    </g>
  </g>

  <path class="line thin soft" d="M280 785 H920"/>
  <text x="600" y="812" text-anchor="middle" class="label" font-size="25" font-weight="700">
    真正要修复的，是脚后跟到骨盆、骨盆到胸廓的承重秩序。
  </text>
</svg>
